<!doctype html>
<html>
  <head>
    <title>SpreadJS in TypeScript</title>
    <link
      rel="stylesheet"
      type="text/css"
      href="node_modules/@grapecity-software/spread-sheets/styles/gc.spread.sheets.excel2013white.css"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="node_modules/@grapecity-software/spread-sheets-designer/styles/gc.spread.sheets.designer.light.min.css"
    />
    <script src="node_modules/systemjs/dist/system.src.js"></script>
    <script
      src="node_modules/jquery/dist/jquery.min.js"
      integrity="sha512-3gJwYpMe3QewGELv8k/BX9vcqhryRdzRMxVfq6ngyWXwo03GFEzjsUm8Q7RZcHPHksttq7/GFoxjCVUjkjvPdw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <script
      src="node_modules/jsignature/libs/jSignature.min.js"
      integrity="sha512-lZ7GJNAmaXw7L4bCR5ZgLFu12zSkuxHZGPJdIoAqP6lG+4eoSvwbmKvkyfauz8QyyzHGUGVHyoq/W+3gFHCLjA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <script src="../../shared/systemjs.config.js"></script>
    <script>
      System.import("./src/app");
    </script>
  </head>
  <body>
    <div
      id="signArea"
      style="
        position: absolute;
        top: 100px;
        left: 200px;
        visibility: hidden;
        z-index: 100;
      "
    >
      <div
        id="sign"
        style="
          height: 300px;
          width: 600px;
          border: 1px dashed #ddd;
          margin-bottom: 10px;
        "
      ></div>
      <div>
        <button id="clear">清空</button>
        <button id="confirm">确认</button>
      </div>
    </div>
    <p>请在任意单元格点击鼠标右键，添加手写签名</p>
    <div
      id="designer-container"
      style="width: 100%; height: 90vh; border: 1px solid darkgray"
    ></div>
  </body>
</html>
